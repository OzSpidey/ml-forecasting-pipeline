name: Weekly Model Retraining

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      tickers:
        description: "Space-separated tickers (leave blank for all)"
        required: false
        default: ""
      skip_lstm:
        description: "Skip LSTM training (faster CI)"
        type: boolean
        default: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Run retraining
        run: |
          TICKERS="${{ github.event.inputs.tickers }}"
          SKIP="${{ github.event.inputs.skip_lstm }}"
          CMD="python retrain.py"
          [ -n "$TICKERS" ] && CMD="$CMD --tickers $TICKERS"
          [ "$SKIP" = "true" ] && CMD="$CMD --no-lstm"
          eval $CMD

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-${{ github.run_id }}
          path: |
            mlflow.db
            mlruns/
            models/
          retention-days: 30
